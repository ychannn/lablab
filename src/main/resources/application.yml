# application.yml
# 上传目录：相对路径表示相对进程工作目录（启动时的项目根），上线时保持一致即可
app:
  upload-dir: uploads

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lab?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root # 你的数据库用户名
    password: edraqwq1 # 你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰（可选）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 输出到控制台
  mapper-locations: classpath:mapper/*.xml

# application.yml
logging:
  level:
    # 配置Mapper接口所在包的日志级别为DEBUG
    org.ychan.lablab.mapper: DEBUG
    # 或直接配置MyBatis核心包的日志级别
    com.baomidou.mybatisplus: DEBUG
    org.apache.ibatis: DEBUG
