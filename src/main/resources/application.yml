# application.yml
# 上传目录：相对路径表示相对进程工作目录（启动时的项目根），上线时保持一致即可
app:
  upload-dir: uploads
  # 邮件发件账号与授权码从该文件读取（不写在此处）。文件格式见 mail-credentials.properties.example
  mail-credentials-file: ./mail-credentials.properties

# 邮件（可选）：不配置则验证码只打印在后端控制台
# 真正发邮件时：1) 复制 mail-credentials.properties.example 为 mail-credentials.properties 并填写
# 2) 取消上面 app.mail-credentials-file 的注释  3) 取消下面 spring.mail 的注释（仅 host/port，无账号密码）
spring:
  mail:
    host: smtp.163.com
    port: 465
    properties: { mail.smtp.auth: true, mail.smtp.ssl.enable: true }
  datasource:
    url: jdbc:mysql://localhost:4406/lab?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root # 你的数据库用户名
    password: edraqwq1 # 你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Elasticsearch 配置（已禁用）
  # elasticsearch:
  #   uris: http://localhost:9200
  #   connection-timeout: 5s
  #   socket-timeout: 30s
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰（可选）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 输出到控制台
  mapper-locations: classpath:mapper/*.xml

# application.yml
logging:
  level:
    # 配置Mapper接口所在包的日志级别为DEBUG
    org.ychan.lablab.mapper: DEBUG
    # 或直接配置MyBatis核心包的日志级别
    com.baomidou.mybatisplus: DEBUG
    org.apache.ibatis: DEBUG
